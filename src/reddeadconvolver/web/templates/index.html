<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RedDeadConvolver Dashboard</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        background: #111827;
        color: #f3f4f6;
      }
      .container {
        max-width: 920px;
        margin: 2rem auto;
        padding: 1.5rem;
        background: #1f2937;
        border-radius: 12px;
      }
      h1 { margin-top: 0; }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }
      .full { grid-column: 1 / -1; }
      label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
      input, select {
        width: 100%;
        padding: 0.5rem;
        border-radius: 8px;
        border: 1px solid #374151;
        background: #111827;
        color: #f9fafb;
      }
      button {
        margin-top: 1rem;
        width: 100%;
        background: #2563eb;
        color: #fff;
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
      }
      button:disabled { background: #4b5563; cursor: not-allowed; }
      .status {
        margin-top: 1rem;
        min-height: 1.5rem;
        color: #93c5fd;
      }
      .note { color: #d1d5db; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>RedDeadConvolver Dashboard (MVP)</h1>
      <p class="note">Upload a signal and an impulse response WAV file, configure parameters, then download the processed output.</p>

      <form id="convolve-form" class="grid">
        <div>
          <label for="signal">Signal WAV</label>
          <input id="signal" name="signal" type="file" accept="audio/wav" required />
        </div>
        <div>
          <label for="ir">Impulse Response WAV</label>
          <input id="ir" name="ir" type="file" accept="audio/wav" required />
        </div>

        <div>
          <label for="mode">Convolution Mode</label>
          <select id="mode" name="mode">
            <option value="full">full</option>
            <option value="same">same</option>
            <option value="valid">valid</option>
          </select>
        </div>
        <div>
          <label for="channel_strategy">Channel Strategy</label>
          <select id="channel_strategy" name="channel_strategy">
            <option value="match">match</option>
            <option value="sum_ir">sum_ir</option>
            <option value="left">left</option>
            <option value="right">right</option>
          </select>
        </div>

        <div>
          <label for="dry">Dry</label>
          <input id="dry" name="dry" type="number" step="0.01" min="0" value="0.0" />
        </div>
        <div>
          <label for="wet">Wet</label>
          <input id="wet" name="wet" type="number" step="0.01" min="0" value="1.0" />
        </div>

        <div>
          <label for="normalize">Normalize</label>
          <select id="normalize" name="normalize">
            <option value="peak">peak</option>
            <option value="none">none</option>
            <option value="rms">rms</option>
          </select>
        </div>
        <div>
          <label for="rms_target">RMS Target</label>
          <input id="rms_target" name="rms_target" type="number" step="0.01" min="0.01" value="0.1" />
        </div>

        <div class="full">
          <label for="sample_rate_policy">Sample-Rate Policy</label>
          <select id="sample_rate_policy" name="sample_rate_policy">
            <option value="error">error</option>
            <option value="signal">signal</option>
            <option value="ir">ir</option>
          </select>
        </div>

        <div class="full">
          <button type="submit" id="submit-btn">Process & Download</button>
          <p class="status" id="status"></p>
        </div>
      </form>
    </main>

    <script>
      const form = document.getElementById("convolve-form");
      const submitBtn = document.getElementById("submit-btn");
      const status = document.getElementById("status");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitBtn.disabled = true;
        status.textContent = "Processing...";

        try {
          const body = new FormData(form);
          const response = await fetch("/api/convolve", {
            method: "POST",
            body,
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(text || "Processing failed");
          }

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "convolved_output.wav";
          a.click();
          URL.revokeObjectURL(url);
          status.textContent = "Done. Download started.";
        } catch (error) {
          status.textContent = "Error: " + error.message;
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
